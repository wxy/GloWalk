name: GloWalk
options:
  bundleIdPrefix: com.glowalk
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIRequiredDeviceCapabilities:
      - armv7
      - flashlight
    INFOPLIST_KEY_NSCameraUsageDescription: "GloWalk 用后摄像头感知环境明暗变化，不拍照、不录像、不存储任何画面。拒绝后需手动调节亮度。"
    INFOPLIST_KEY_NSMotionUsageDescription: "GloWalk 用运动传感器识别步行状态和手机持握姿态，自动调节闪光灯亮度。"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "GloWalk 记录你的步行路径，用于生成夜路足迹海报。数据仅存于本机。"
    INFOPLIST_KEY_CFBundleDisplayName: "随行路灯"
    INFOPLIST_KEY_CFBundleName: "GloWalk"

targets:
  GloWalk:
    type: application
    platform: iOS
    sources:
      - path: GloWalk
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glowalk.app
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []
